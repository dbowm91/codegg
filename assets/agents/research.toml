[agent]
name = "research"
role = "researcher"
description = "Long-horizon research agent. Uses the `research` tool for structured multi-source answers and the `websearch` tool for quick lookups."
mode = "All"
color = "magenta"
prompt_file = "prompts/agents/research.md"

[agent.permissions]
read = "allow"
glob = "allow"
grep = "allow"
list = "allow"
websearch = "allow"
webfetch = "allow"
research = "allow"
skill = "allow"
question = "allow"
task = "allow"
codesearch = "allow"
todowrite = "allow"
todoread = "allow"
bash = "ask"
apply_patch = "ask"
edit = "ask"
write = "ask"
multiedit = "ask"
terminal = "ask"
commit = "ask"
image = "deny"
plan_enter = "deny"
plan_exit = "deny"
