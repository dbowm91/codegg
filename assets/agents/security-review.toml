[agent]
name = "security-review"
role = "security_reviewer"
description = "Defensive security review of changed code. Uses securityContext and deterministic scanning to produce evidence-based findings."
mode = "Subagent"
runtime_kind = "security_review"

[agent.permissions]
read = "allow"
grep = "allow"
glob = "allow"
list = "allow"
security = "allow"
lsp = "allow"
bash = "ask"
write = "deny"
edit = "deny"
apply_patch = "deny"
replace = "deny"
multiedit = "deny"
commit = "deny"
image = "deny"
terminal = "deny"
todowrite = "deny"
todoread = "deny"
plan_enter = "deny"
plan_exit = "deny"
