# Execution ownership inventory
#
# Every production source location in `src/` and `crates/` that can
# spawn a process, send work to a worker pool, start a test runner,
# start a background loop, invoke a domain-specific process service,
# create or enqueue a durable job, or acquire scheduler permits or
# workspace locks MUST be declared in this manifest.
#
# This manifest is consumed by `scripts/check_execution_ownership.py`
# (a static guard) and `tests/scheduler_authority_matrix.rs`
# (a runtime assertion that one job produces one attempt and one
# executor entry).
#
# Owner classifications:
#
#   scheduler               — production daemon path that routes through
#                             `JobSubmissionService`. Heavy work.
#   interactive              — long-lived user-controlled PTY / REPL /
#                             editor session.
#   standalone_compat        — explicit `--standalone`, `--stdio`, or
#                             test harness surface, documented outside
#                             the daemon singleton guarantee.
#   definition_or_adapter    — defines the canonical subsystem but does
#                             not invoke it on its own; the canonical
#                             invoker is a scheduler executor.
#   deferred_domain_executor — typed subsystem scheduled for future
#                             migration to scheduler. Currently
#                             documented compatibility path.
#   test_only                — test fixture (`#[cfg(test)]` or `tests/`).
#   forbidden_bypass         — must be fixed; static guard fails.
#
# Add new entries to the bottom. Run the guard after every change:
#
#   python3 scripts/check_execution_ownership.py

# ---------------------------------------------------------------------
# Scheduler-owned production callers (heavy work)
# ---------------------------------------------------------------------

[[site]]
path = "src/tool/bash.rs"
owner = "scheduler"
reason = "test/build/lint/format/managed/shell/python routes submit jobs through JobSubmissionService"
entrypoint = "JobSubmissionService::submit"

