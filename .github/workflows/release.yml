name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            asset_name: codegg-linux-x86_64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            asset_name: codegg-linux-aarch64
            cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
            asset_name: codegg-macos-x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            asset_name: codegg-macos-aarch64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            asset_name: codegg-windows-x86_64.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Install cross
        if: matrix.cross
        run: cargo install cross
      - name: Build
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi
        shell: bash
      - name: Prepare artifact
        run: |
          mkdir -p release
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            cp target/${{ matrix.target }}/release/codegg.exe release/${{ matrix.asset_name }}
          else
            cp target/${{ matrix.target }}/release/codegg release/${{ matrix.asset_name }}
          fi
        shell: bash
      - name: Upload release asset
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: release/${{ matrix.asset_name }}

  generate-checksums:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Generate SHA256 checksums
        run: |
          cd artifacts
          sha256sum */* > checksums.txt
          cat checksums.txt
      - name: Upload checksums
        uses: actions/upload-artifact@v4
        with:
          name: checksums
          path: artifacts/checksums.txt

  create-release:
    needs: [build, generate-checksums]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create ${{ github.ref_name }} \
            --title "Release ${{ github.ref_name }}" \
            --generate-notes \
            artifacts/*/codegg-* \
            artifacts/checksums/checksums.txt
