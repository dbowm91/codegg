name: LSP Real-Server Compatibility

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'  # Weekly on Monday at 6am UTC
  push:
    branches: [main]
    paths:
      - 'crates/egglsp/**'
      - 'src/lsp/**'
      - '.github/workflows/lsp-real-server.yml'

env:
  CARGO_TERM_COLOR: always

jobs:
  rust-analyzer:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.81.0
      - uses: Swatinem/rust-cache@v2

      - name: Install rust-analyzer 2024-11-25
        run: |
          rustup component add rust-analyzer
          echo "CODEGG_RA_BIN=$(which rust-analyzer)" >> $GITHUB_ENV

      - name: Record server versions
        run: |
          echo "=== Server Versions ==="
          rust-analyzer --version

      - name: Run rust-analyzer smoke tests
        run: |
          cargo test -p egglsp \
            --features lsp-real-server-tests \
            --test real_server_smoke \
            -- rust_analyzer --nocapture

      - name: Upload compatibility reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lsp-compat-rust-analyzer
          path: target/lsp-compatibility/
          retention-days: 30

  basedpyright:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.81.0
      - uses: Swatinem/rust-cache@v2

      - name: Install basedpyright 1.13.1
        run: |
          npm install -g basedpyright@1.13.1
          echo "CODEGG_PYRIGHT_BIN=$(which basedpyright-langserver || which basedpyright)" >> $GITHUB_ENV

      - name: Record server versions
        run: |
          echo "=== Server Versions ==="
          basedpyright --version || basedpyright-langserver --version

      - name: Run basedpyright smoke tests
        run: |
          cargo test -p egglsp \
            --features lsp-real-server-tests \
            --test real_server_smoke \
            -- basedpyright --nocapture

      - name: Upload compatibility reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lsp-compat-basedpyright
          path: target/lsp-compatibility/
          retention-days: 30

  gopls:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.81.0
      - uses: Swatinem/rust-cache@v2

      - name: Install Go 1.22.5
        uses: actions/setup-go@v5
        with:
          go-version: '1.22.5'

      - name: Install gopls v0.16.1
        run: |
          go install golang.org/x/tools/gopls@v0.16.1
          echo "CODEGG_GOPLS_BIN=$(which gopls)" >> $GITHUB_ENV

      - name: Record server versions
        run: |
          echo "=== Server Versions ==="
          gopls version

      - name: Run gopls smoke tests
        run: |
          cargo test -p egglsp \
            --features lsp-real-server-tests \
            --test real_server_smoke \
            -- gopls --nocapture

      - name: Upload compatibility reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lsp-compat-gopls
          path: target/lsp-compatibility/
          retention-days: 30

  typescript-language-server:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.81.0
      - uses: Swatinem/rust-cache@v2

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install typescript-language-server v4.3.3
        run: |
          npm install -g typescript-language-server@4.3.3 typescript@5.5.4
          echo "CODEGG_TS_LS_BIN=$(which typescript-language-server)" >> $GITHUB_ENV

      - name: Record server versions
        run: |
          echo "=== Server Versions ==="
          typescript-language-server --version
          tsc --version

      - name: Run typescript-language-server smoke tests
        run: |
          cargo test -p egglsp \
            --features lsp-real-server-tests \
            --test real_server_smoke \
            -- typescript --nocapture

      - name: Upload compatibility reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lsp-compat-typescript-language-server
          path: target/lsp-compatibility/
          retention-days: 30

  clangd:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.81.0
      - uses: Swatinem/rust-cache@v2

      - name: Install clangd 18.1.8
        run: |
          CLANGD_VERSION="18.1.8"
          CLANGD_SHA256="54ec30358afcc9fb8aa74307db3046f5187f9fb89fb37064cdde906e062ebf36"
          wget -q "https://github.com/llvm/llvm-project/releases/download/llvmorg-${CLANGD_VERSION}/clang+llvm-${CLANGD_VERSION}-x86_64-linux-gnu-ubuntu-18.04.tar.xz" -O /tmp/clangd.tar.xz
          echo "${CLANGD_SHA256}  /tmp/clangd.tar.xz" | sha256sum -c -
          tar -xf /tmp/clangd.tar.xz -C /tmp
          sudo cp /tmp/clang+llvm-${CLANGD_VERSION}-x86_64-linux-gnu-ubuntu-18.04/bin/clangd /usr/local/bin/clangd
          sudo chmod +x /usr/local/bin/clangd
          echo "CODEGG_CLANGD_BIN=/usr/local/bin/clangd" >> $GITHUB_ENV
          rm -rf /tmp/clangd.tar.xz /tmp/clang+llvm-${CLANGD_VERSION}-x86_64-linux-gnu-ubuntu-18.04

      - name: Record server versions
        run: |
          echo "=== Server Versions ==="
          echo "clangd version: 18.1.8 (pinned release archive)"
          clangd --version

      - name: Run clangd smoke tests
        run: |
          cargo test -p egglsp \
            --features lsp-real-server-tests \
            --test real_server_smoke \
            -- clangd --nocapture

      - name: Upload compatibility reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lsp-compat-clangd
          path: target/lsp-compatibility/
          retention-days: 30

  # Pass 9 — `matrix-summary` aggregates the per-server
  # artifacts into a single manifest that links each server
  # to its artifact path and exact version. Reviewers
  # read this manifest to locate the evidence used to
  # close Phase 4 without parsing per-server JSON. The
  # job runs after all per-server jobs complete and
  # fails if any per-server artifact is missing or invalid.
  matrix-summary:
    needs:
      - rust-analyzer
      - basedpyright
      - gopls
      - typescript-language-server
      - clangd
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download all per-server artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: lsp-compat-*
          path: target/lsp-compatibility/downloaded
      - name: Aggregate matrix manifest
        run: |
          python3 scripts/aggregate_lsp_compatibility_manifest.py \
            --input target/lsp-compatibility/downloaded \
            --output target/lsp-compatibility/matrix-manifest.json \
            --expected-commit "$GITHUB_SHA" \
            --expected-run-id "$GITHUB_RUN_ID"
      - name: Upload aggregated matrix manifest
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lsp-compat-matrix-manifest
          path: target/lsp-compatibility/matrix-manifest.json
          retention-days: 90
